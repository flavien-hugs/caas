name: CI

on:
  push:
    branches:
      - main
      - develop
      - preprod
      - rc/*
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

# Annule les runs obsolètes sur une même PR (économie de minutes). On laisse
# les runs des branches de déploiement aller au bout (publication d'images).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io

jobs:
  # ---------------------------------------------------------------------------
  # Détection des changements — ne builder/tester que ce qui a bougé
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Filter paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/**'
            frontend:
              - 'frontend/**'
              - '.github/workflows/**'

  # ---------------------------------------------------------------------------
  # Backend — tests Python
  # ---------------------------------------------------------------------------
  test-backend:
    name: Backend · Lint & Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Poetry & pre-commit
        run: pipx install poetry && pipx install pre-commit

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: poetry
          cache-dependency-path: backend/poetry.lock

      - name: Cache pre-commit hooks
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('backend/.pre-commit-config.yaml') }}

      - name: Install dependencies
        run: poetry install --with test

      - name: Run tests with coverage
        env:
          SMTP_HOST: "localhost"
          SMTP_USER: "test@example.com"
          SMTP_PASSWORD: "testpassword"
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          KKIAPAY_PUBLIC_KEY: "pk_test_123"
          KKIAPAY_PRIVATE_KEY: "sk_test_123"
          KKIAPAY_SECRET_KEY: "sk_test_456"
          SESSION_SECRET: "ci-test-secret"
        run: poetry run pytest --cov --cov-report=term --cov-report=xml:coverage.xml tests --durations=10

      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: backend/coverage.xml
          if-no-files-found: warn
          retention-days: 14

      # Scopé aux fichiers backend: sans ça, pre-commit balaierait tout le
      # monorepo (les hooks génériques flageraient des fichiers frontend).
      - name: Lint (pre-commit)
        working-directory: ${{ github.workspace }}
        run: |
          mapfile -t FILES < <(git ls-files 'backend/**')
          pre-commit run \
            --config backend/.pre-commit-config.yaml \
            --files "${FILES[@]}" \
            --show-diff-on-failure

  # ---------------------------------------------------------------------------
  # Frontend — type-check
  # ---------------------------------------------------------------------------
  check-frontend:
    name: Frontend · Lint & Type-check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Lint (prettier + eslint)
        run: pnpm lint

      - name: Type-check (svelte-check)
        run: pnpm check

  # ---------------------------------------------------------------------------
  # Tag Docker partagé (push uniquement)
  # ---------------------------------------------------------------------------
  docker-meta:
    name: Compute Docker tag
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      eligible: ${{ steps.tag.outputs.eligible }}
      image_base: ${{ steps.tag.outputs.image_base }}
    steps:
      - name: Compute tag + image base
        id: tag
        run: |
          # GHCR exige un chemin minuscule ghcr.io/<owner>/<repo>.
          echo "image_base=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

          REF_NAME="${GITHUB_REF#refs/heads/}"
          case "$REF_NAME" in
            main)    TAG="latest" ;;
            develop) TAG="dev" ;;
            preprod) TAG="preprod" ;;
            rc/*)    TAG="${REF_NAME#rc/}_RC" ;;
            *)
              echo "Branch $REF_NAME not eligible for Docker image"
              echo "eligible=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "eligible=true" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Backend — image dédiée
  # ---------------------------------------------------------------------------
  build-backend:
    name: Backend · Build & Push
    runs-on: ubuntu-latest
    needs: [changes, test-backend, docker-meta]
    if: >-
      github.event_name == 'push'
      && needs.changes.outputs.backend == 'true'
      && needs.docker-meta.outputs.eligible == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.docker-meta.outputs.image_base }}-backend
          tags: |
            type=raw,value=${{ needs.docker-meta.outputs.tag }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # ---------------------------------------------------------------------------
  # Frontend — image dédiée
  # ---------------------------------------------------------------------------
  build-frontend:
    name: Frontend · Build & Push
    runs-on: ubuntu-latest
    needs: [changes, check-frontend, docker-meta]
    if: >-
      github.event_name == 'push'
      && needs.changes.outputs.frontend == 'true'
      && needs.docker-meta.outputs.eligible == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.docker-meta.outputs.image_base }}-frontend
          tags: |
            type=raw,value=${{ needs.docker-meta.outputs.tag }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
