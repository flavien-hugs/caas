[project]
name = "caas"
version = "0.1.0"
description = "CaaS backend (Phase 1: refactor without tenancy)"
authors = [
    {name = "Flavien HUGS", email = "flavienhugs@pm.me"}
]

requires-python = ">=3.12,<4"
dependencies = [
    "fastapi[standard] (>=0.128.0)",
    "uvicorn[standard] (>=0.32.0)",
    "sqlmodel (==0.0.38)",
    "asyncpg (>=0.29.0)",
    "aiosqlite (>=0.20.0)",
    "alembic (>=1.18)",
    "pydantic-settings (>=2.1.0)",
    "redis (>=5.0.0)",
    "celery (>=5.3.0)",
    "celery-types (>=0.24.0,<0.26.0)",
    "httpx (>=0.28.1,<0.29.0)",
    "slowapi (>=0.1.9,<0.2.0)",
    "fastapi-pagination (>=0.15.10,<0.16.0)",
    "greenlet (>=3.3.2,<4.0.0)",
    "typer (>=0.12.0)",
    "email-validator (>=2.0.0)",
    "jinja2 (>=3.1.0)",
    "xlsxwriter (>=3.2.0)",
    "itsdangerous (>=2.2.0)",
    "bcrypt (>=4.2.0)",
    "cryptography (>=43.0.0)",
]

[project.scripts]
caas = "src.cli:cli"

[tool.poetry]
package-mode = true
packages = [{ include = "src" }]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
python_files = "test_*.py"
capture = "no"
log-cli-level = "INFO"
filterwarnings = [
    "ignore",
    "ignore:.*U.*mode is deprecated:DeprecationWarning"
]

[tool.ruff]
line-length = 128
target-version = "py312"
# Alembic migrations are (mostly) autogenerated — leave them out of lint/format.
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
# Replaces black + isort + flake8(+bugbear). "I" = import sorting.
select = ["E", "F", "W", "I", "B"]
# Notably B008 = FastAPI Depends() in argument defaults (idiomatic, keep off).
# Whitespace codes (E2xx) are owned by the formatter. Protocol ``...`` stubs
# aren't flagged by Ruff, so no E704 ignore is needed.
ignore = ["E402", "B006", "B008", "B010"]

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[dependency-groups]
dev = [
    "pre-commit (>=4.5.1,<5.0.0)",
    "ruff (>=0.15.0,<0.16.0)",
]
test = [
    "pytest (>=7.2.1)",
    "pytest-asyncio (>=1.3.0)",
    "pytest-cov (>=4.0.0)",
    "httpx (>=0.28.1,<0.29.0)",
    "aiosqlite (>=0.22.1,<0.23.0)",
]
